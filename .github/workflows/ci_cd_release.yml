name: SEVEN Charging CI/CD Custom Docker

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # Bước 1: Kéo mã nguồn và file Dockerfile của bạn về máy chủ
      - name: 1. Checkout Repository
        uses: actions/checkout@v4

      # Bước 2: THỰC THI DOCKERFILE - GitHub sẽ tự cài Ubuntu, Java, Flutter...
      - name: 2. Build Custom Docker Environment
        run: docker build -t my-flutter-env .

      # Bước 3: Đưa code vào trong Container vừa xây và tiến hành CI/CD
      - name: 3. Run CI/CD inside Custom Docker
        run: |
          docker run --rm -v ${{ github.workspace }}:/app my-flutter-env bash -c "
            git config --global --add safe.directory '*' &&
            flutter pub get &&
            flutter analyze --no-fatal-infos --no-fatal-warnings &&
            flutter build apk --release
          "

      # Bước 4: Lấy file APK mang lên trang Releases cho người dùng tải (GIỮ NGUYÊN DEPLOY)
      - name: 4. Publish to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          files: build/app/outputs/flutter-apk/app-release.apk
          generate_release_notes: true